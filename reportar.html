<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Desk - Reportar Incidente</title>
</head>
<body>
    <header>
        <img src="assets/img/logo.png" alt="Logo del Sistema Help Desk" width="150">
        <h1>Sistema de Gestión de Incidentes (Help Desk)</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Inicio (Dashboard)</a></li>
            <li><a href="reportar.html">Reportar Incidente</a></li>
            <li><a href="tickets.html">Ver Tickets</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Ingreso de Nuevo Incidente</h2>
            <article>
                <form action="#" method="POST">
                    <p>
                        <label for="titulo">Título del incidente:</label><br>
                        <input type="text" id="titulo" name="titulo" required>
                    </p>

                    <p>
                        <label for="categoria">Categoría:</label><br>
                        <select id="categoria" name="categoria" required>
                            <option value="">Seleccione una categoría...</option>
                            <option value="red">Red</option>
                            <option value="hardware">Hardware</option>
                            <option value="software">Software</option>
                        </select>
                    </p>

                    <p>Nivel de prioridad:</p>
                    <p>
                        <input type="radio" id="alta" name="prioridad" value="alta" required>
                        <label for="alta">Alta</label><br>
                        
                        <input type="radio" id="media" name="prioridad" value="media">
                        <label for="media">Media</label><br>
                        
                        <input type="radio" id="baja" name="prioridad" value="baja">
                        <label for="baja">Baja</label>
                    </p>

                    <p>
                        <label for="descripcion">Descripción detallada:</label><br>
                        <textarea id="descripcion" name="descripcion" rows="5" cols="40" required></textarea>
                    </p>

                    <p>
                        <button type="submit">Enviar Reporte</button>
                    </p>
                </form>
            </article>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Sistema de Help Desk. Todos los derechos reservados.</p>
        <p>Contacto de soporte: soporte@empresa.com</p>
    </footer>
</body>
</html>
